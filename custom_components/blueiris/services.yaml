trigger_camera:
  name: Trigger Camera
  description: Triggers the selected camera in Blue Iris
  target:
    entity:
      integration: blueiris
      domain: camera

move_to_preset:
  name: Move to Preset
  description: Moves the selected camera to the specified preset
  target:
    entity:
      integration: blueiris
      domain: camera
  fields:
    preset:
      name: Preset
      description: Desired preset number
      required: true
      default: 1
      example: 1
      selector:
        number:
          min: 1
          max: 40
          step: 1
          mode: box
          
reload:
  name: Reload
  description: Reload one Blue Iris config entry, or all entries if no entry_id is provided.
  fields:
    entry_id:
      name: Config entry ID
      description: The config entry ID to reload. If omitted, all Blue Iris entries are reloaded.
      example: 01KJNTBTYN82YCCX7WB5J2J3CT
      required: false
      selector:
        text:

latest_motion_event_snapshot:
  name: Latest Motion Event Snapshot
  description: Returns metadata for the latest motion event for a Blue Iris camera and optionally saves a still image.
  target:
    entity:
      integration: blueiris
      domain: camera
  fields:
    filename:
      name: Filename
      description: Optional filename for the saved snapshot. If omitted, the integration will create one automatically (e.g. driveway_latest.jpg). Files are stored in /config/www/blueiris/.
      required: false
      example: driveway_latest.jpg
      selector:
        text: